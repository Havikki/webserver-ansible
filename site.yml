---
- name: Webpalvelimen automaattinen asennus
  hosts: all
  become: true

  vars_prompt:
    - name: webserver_choice
      prompt: "\nValitse webpalvelin\n  1 = apache2\n  2 = nginx\nValinta (1/2)"
      default: "2"
      private: no

    - name: install_certbot
      prompt: "\nAsenna certbot HTTPS-sertifikaattia varten? (yes/no)"
      default: "no"
      private: no

    - name: domain
      prompt: "\nDomain-nimi (esim. example.com) - jätä tyhjäksi jos ei ole"
      default: ""
      private: no

    - name: email
      prompt: "\nSähköposti certbot-ilmoituksia varten (tarvitaan vain jos certbot=yes)"
      default: ""
      private: no

  pre_tasks:
    - name: Tarkista webserver-muuttujan arvo
      fail:
        msg: "Virheellinen valinta '{{ webserver_choice }}'. Valitse 1 (apache2) tai 2 (nginx)."
      when: webserver_choice not in ['1', '2', 'apache2', 'nginx']

    - name: Aseta webserver-muuttuja valinnan perusteella
      set_fact:
        webserver: "{{ 'apache2' if webserver_choice in ['1', 'apache2'] else 'nginx' }}"

    - name: Tarkista domain jos certbot halutaan
      fail:
        msg: "Domain-nimi vaaditaan certbotin asennukseen."
      when: install_certbot == "yes" and domain == ""

  roles:
    - webserver