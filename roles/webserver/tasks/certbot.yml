---
- name: Päivitä pakettivälimuisti ennen certbot-asennusta
  apt:
    update_cache: yes

- name: Asenna certbot ja oikea plugin
  apt:
    name:
      - certbot
      - "python3-certbot-{{ 'apache' if webserver == 'apache2' else 'nginx' }}"
    state: present

- name: Hanki TLS-sertifikaatti ({{ domain }})
  command: >
    certbot --{{ webserver if webserver == 'nginx' else 'apache' }}
    --non-interactive
    --agree-tos
    --email {{ email }}
    --redirect
    -d {{ domain }}
  args:
    creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
  notify: reload webserver

- name: Varmista automaattinen uusiminen (systemd timer)
  service:
    name: certbot.timer
    state: started
    enabled: yes