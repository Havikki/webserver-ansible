---
- name: Asenna nginx
  apt:
    name: nginx
    state: present

- name: Poista apache2 jos asennettuna (konflikti portissa 80)
  apt:
    name: apache2
    state: absent
  notify: reload webserver

- name: Aseta webroot-muuttuja
  set_fact:
    webroot: /var/www/html
    webserver_service: nginx

- name: Kopioi Nginx server block -konfiguraatio
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/webserver-ansible
    owner: root
    group: root
    mode: "0644"
  notify: reload webserver

- name: Aktivoi sivusto (symlink)
  file:
    src: /etc/nginx/sites-available/webserver-ansible
    dest: /etc/nginx/sites-enabled/webserver-ansible
    state: link
  notify: reload webserver

- name: Poista oletussivu
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload webserver

- name: Varmista että nginx on käynnissä ja käynnistyy bootissa
  service:
    name: nginx
    state: started
    enabled: yes
